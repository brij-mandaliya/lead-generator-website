server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy API requests to the api service.
    # nginx and api share the compose network, so the hostname "api" resolves.
    location /api/ {
        proxy_pass http://prospecthive-api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — let the Vite-built index.html handle client routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
