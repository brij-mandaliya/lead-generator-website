services:
  - type: web
    name: prospecthive-api
    env: docker
    dockerfilePath: ./docker/Dockerfile.api-render
    healthCheckPath: /api/healthz
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_SSL
        value: "true"
      - key: SESSION_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: RAZORPAY_ENVIRONMENT
        value: test
      - key: RAZORPAY_KEY_ID_TEST
        sync: false
      - key: RAZORPAY_KEY_SECRET_TEST
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET_TEST
        sync: false
      - key: RAZORPAY_KEY_ID_LIVE
        sync: false
      - key: RAZORPAY_KEY_SECRET_LIVE
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET_LIVE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: web
    name: prospecthive-frontend
    env: docker
    dockerfilePath: ./docker/Dockerfile.frontend-render
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 80
      - key: BASE_PATH
        value: /
      - key: API_URL
        sync: false
